<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="refresh" content="5" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Rubik:ital,wght@0,300..900;1,300..900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/static/css/general.css" />
    <link rel="stylesheet" href="/static/css/style.css" />
    <link rel="stylesheet" href="/static/css/queries.css" />
    <link rel="stylesheet" href="/static/css/confirm.css" />
    <link rel="stylesheet" href="/static/css/dashboard.css" />
    <title>Chef Dashboard</title>
  </head>
  <body>
    <header class="header">
      <a href="#">
        <img
          class="logo"
          alt="Pizzeria del Gatito logo"
          src="/static/img/logo.png"
        />
      </a>
      <button class="nav-icon">
        <a href="/login"
          ><ion-icon class="nav-icon" name="person-outline"></ion-icon
        ></a>
      </button>
    </header>
    <section class="dash-order">
      <div class="container">
        <h1 class="heading-primary">Chef Dashboard</h1>
        {% for order in orders %}
        <div class="dash-card">
          <div class="table-info">
            <h3 class="heading-tertiary">Order ID: {{ order.orderId }}</h3>
            <p>Table Number: {{ order.tablenr }}</p>
            <p>Time: {{ order.time }}</p>
          </div>
          <div class="pizza-quant">
            <table>
              <thead>
                <tr>
                  <th class="pz-name">Pizza</th>
                  <th>Quantity</th>
                </tr>
              </thead>
              <tbody>
                {% for item in order.order_items %}
                <tr>
                  <td>{{ item[0] }}</td>
                  <td class="pz-quant">{{ item[1] }}</td>
                </tr>
                {% endfor %}
              </tbody>
            </table>
          </div>
          <form method="POST" action="{{ url_for('validate_order') }}">
            <input type="hidden" name="orderId" value="{{ order.orderId }}" />
            <button type="submit">Confirm Order</button>
          </form>
        </div>
        {% endfor %}
      </div>
    </section>
    <script
      type="module"
      src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"
    ></script>
    <script
      nomodule
      src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"
    ></script>
    <script src="/static/script.js"></script>
  </body>
</html>
